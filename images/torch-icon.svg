  </defs>
  <!-- Handle -->
  <rect x="28" y="36" width="8" height="24" rx="3" fill="url(#handle-grad)"/>
  <rect x="26" y="34" width="12" height="6" rx="2" fill="#A0522D"/>
  <!-- Flame -->
  <path d="M32 4 C32 4, 44 18, 44 26 C44 32, 38 36, 32 36 C26 36, 20 32, 20 26 C20 18, 32 4, 32 4Z" fill="url(#flame-grad)" opacity=".9"/>
  <path d="M32 12 C32 12, 38 20, 38 25 C38 29, 35 32, 32 32 C29 32, 26 29, 26 25 C26 20, 32 12, 32 12Z" fill="#FFC857" opacity=".7"/>
  <ellipse cx="32" cy="26" rx="4" ry="6" fill="#FFF8DC" opacity=".5"/>
</svg>
