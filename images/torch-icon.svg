<!-- Torch Icon - used for spark quotes and section accents -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="icon-torch">
  <defs>
    <linearGradient id="flame-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF2D20"/>
      <stop offset="40%" style="stop-color:#FF5A1F"/>
      <stop offset="70%" style="stop-color:#FF7A18"/>
      <stop offset="100%" style="stop-color:#FFC857"/>
    </linearGradient>
    <linearGradient id="handle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#5C2D0A"/>
